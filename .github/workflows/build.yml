# Tag + manual builds that publish one GitHub Release (Electron-style: build matrix → single release job).
# Does not replace ci.yml (PR / main smoke tests). Settings → Actions → Workflow permissions → Read and write.
name: Build WinUSB Switcher Lite

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # One Vite build for both Linux targets (amd64 runner + i386 container cannot run Node 20).
  linux-frontend-dist:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build frontend (out/renderer)
        run: yarn build

      - uses: actions/upload-artifact@v4
        with:
          name: linux-frontend-dist
          path: out/renderer
          retention-days: 3

  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-pc-windows-msvc, i686-pc-windows-msvc]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri
          sharedKey: windows-${{ matrix.target }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build & package (Windows ${{ matrix.target }})
        run: yarn tauri:build -- --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-windows-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/
          if-no-files-found: warn
          retention-days: 14

  # GitHub-hosted Intel macOS runners (e.g. macos-13) are gone. One Apple Silicon runner builds a
  # fat/universal binary (aarch64 + x86_64) so Intel and Apple Silicon Macs get a single DMG/.app.
  build-macos:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build & package (macOS universal)
        run: yarn tauri:build -- --target universal-apple-darwin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-macos
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/
            src-tauri/target/universal-apple-darwin/release/bundle/macos/
          if-no-files-found: warn
          retention-days: 14

  build-linux:
    needs: linux-frontend-dist
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri
          sharedKey: linux-x86_64

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Fetch prebuilt frontend
        uses: actions/download-artifact@v4
        with:
          name: linux-frontend-dist
          path: out/renderer

      - name: Build & package (Linux x86_64)
        run: yarn tauri:build -- --config src-tauri/tauri.conf.ci-prefrontend.json --bundles deb,appimage

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-linux-x86_64-unknown-linux-gnu
          path: |
            src-tauri/target/release/bundle/deb/
            src-tauri/target/release/bundle/appimage/
          if-no-files-found: warn
          retention-days: 14

  # Native i386 userland: GTK/appindicator -dev packages exist (unlike :i386 multiarch on amd64).
  # Node 20 has no linux-x86 build → reuse frontend artifact; Node 16 linux-x86 runs staging.mjs only.
  build-linux-i686:
    needs: linux-frontend-dist
    runs-on: ubuntu-22.04
    container:
      # Docker Hub `i386/ubuntu` is only maintained up to 18.04; use a 22.04 i386 image.
      image: asabatep/ubuntu-i386:22.04
    steps:
      - name: Install OS packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git ca-certificates curl xz-utils \
            build-essential pkg-config libssl-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: actions/checkout@v4

      - name: Fetch prebuilt frontend
        uses: actions/download-artifact@v4
        with:
          name: linux-frontend-dist
          path: out/renderer

      - name: Install Node 16 (linux-x86) for J-Link staging script
        run: |
          curl -fsSL https://nodejs.org/dist/v16.20.2/node-v16.20.2-linux-x86.tar.xz -o /tmp/node.tar.xz
          tar -xJf /tmp/node.tar.xz -C /usr/local --strip-components=1
          node -v

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-tauri binary
        uses: actions/cache@v4
        id: tauri-cli-bin
        with:
          path: /root/.cargo/bin/cargo-tauri
          key: tauri-cli-i686-2.10.1-v2

      - name: Cargo install tauri-cli
        if: steps.tauri-cli-bin.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --version 2.10.1

      - name: Build & package (Linux i686)
        run: |
          cd src-tauri
          cargo tauri build --config tauri.conf.ci-prefrontend.json --bundles deb,appimage
        env:
          PATH: /root/.cargo/bin:/usr/local/bin:/usr/bin:/bin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-linux-i686-unknown-linux-gnu
          path: |
            src-tauri/target/release/bundle/deb/
            src-tauri/target/release/bundle/appimage/
          if-no-files-found: warn
          retention-days: 14

  release:
    needs:
      - build-windows
      - build-macos
      - build-linux
      - build-linux-i686
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all bundle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: |
            **/*.msi
            **/*.exe
            **/*.dmg
            **/*.app.tar.gz
            **/*.AppImage
            **/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
